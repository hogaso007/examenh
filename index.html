<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noticias Hoy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
      color: #222;
    }

    header {
      background: #c40000;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #222;
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ff4d4d;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: 25px auto;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .main-news {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .main-news img {
      width: 100%;
      height: 350px;
      object-fit: cover;
    }

    .main-news-content {
      padding: 20px;
    }

    .main-news h2 {
      margin-bottom: 15px;
      color: #c40000;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .side-news {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .side-news img {
      width: 100%;
      height: 180px;
</head>
<body>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Política</a>
    <a href="#">Deportes</a>
    <a href="#">Tecnología</a>
    <a href="#">Economía</a>
  </nav>

  <section class="container">
    <article class="main-news">
      <img src="https://picsum.photos/900/400" alt="Noticia principal">
      <div class="main-news-content">
        <h2>Gran avance tecnológico sorprende al mundo</h2>
        <p>
          Científicos presentan una nueva innovación que promete cambiar la forma en que usamos la tecnología diariamente.
          Expertos aseguran que este avance podría revolucionar distintos sectores.
        </p>
      </div>
    </article>

    <aside class="sidebar">
      <div class="side-news">
        <img src="https://picsum.photos/400/200?1" alt="Noticia secundaria">
        <div class="side-news-content">
          <h3>Deportes</h3>
          <p>El campeonato entra en su etapa más emocionante.</p>
        </div>
      </div>

      <div class="side-news">
        <img src="https://picsum.photos/400/200?2" alt="Noticia secundaria">
        <div class="side-news-content">
          <h3>Economía</h3>
          <p>Mercados internacionales muestran señales de recuperación.</p>
        </div>
      </div>
    </aside>
  </section>

  <section class="news-grid">
    <div class="card">
      <img src="https://picsum.photos/400/250?3" alt="Noticias">
      <div class="card-content">
        <h3>Política</h3>
        <p>Nuevas reformas generan debate entre expertos.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/250?4" alt="Noticias">
      <div class="card-content">
        <h3>Tecnología</h3>
        <p>La inteligencia artificial continúa creciendo rápidamente.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/250?5" alt="Noticias">
      <div class="card-content">
        <h3>Internacional</h3>
        <p>Líderes mundiales se reúnen para discutir nuevos acuerdos.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/250?6" alt="Noticias">
      <div class="card-content">
        <h3>Ciencia</h3>
        <p>Descubrimiento abre nuevas posibilidades para la medicina.</p>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 Noticias Hoy - Todos los derechos reservados</p>
  </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noticias Hoy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
      color: #222;
    }

    header {
      background: #c40000;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #222;
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ff4d4d;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: 25px auto;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .main-news {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .main-news img {
      width: 100%;
      height: 350px;
      object-fit: cover;
    }

    .main-news-content {
      padding: 20px;
    }

    .main-news h2 {
      margin-bottom: 15px;
      color: #c40000;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .side-news {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

</head>
